version: "2.0"
project_id: "petclinic-stage13"
project_type: "SPRING_BOOT"
settings:
  max_iterations: 3
  timeout_seconds: 30
  default_strategy: "HYBRID"
  fail_on_critical: true
  auto_fix_naming: false
rules:
  - id: "petclinic-owner-controller-name"
    name: "Owner controllers should have Controller suffix"
    description: "Owner controllers should use the Controller suffix"
    type: "NAMING_CONVENTION"
    from_package: "org.springframework.samples.petclinic.owner..*"
    constraint: "NAMING_SUFFIX"
    pattern: "Controller"
    from_selector_mode: "CLASS_TYPE"
    from_class_type: "CONTROLLER"
    to_selector_mode: "PACKAGE"
    severity: "INFO"
    weight: 0.5
    enabled: true
    suggested: false

  - id: "petclinic-vet-controller-name"
    name: "Vet controllers should have Controller suffix"
    description: "Vet controllers should use the Controller suffix"
    type: "NAMING_CONVENTION"
    from_package: "org.springframework.samples.petclinic.vet..*"
    constraint: "NAMING_SUFFIX"
    pattern: "Controller"
    from_selector_mode: "CLASS_TYPE"
    from_class_type: "CONTROLLER"
    to_selector_mode: "PACKAGE"
    severity: "INFO"
    weight: 0.5
    enabled: true
    suggested: false

  - id: "petclinic-system-controller-name"
    name: "System controllers should have Controller suffix"
    description: "System controllers should use the Controller suffix"
    type: "NAMING_CONVENTION"
    from_package: "org.springframework.samples.petclinic.system..*"
    constraint: "NAMING_SUFFIX"
    pattern: "Controller"
    from_selector_mode: "CLASS_TYPE"
    from_class_type: "CONTROLLER"
    to_selector_mode: "PACKAGE"
    severity: "INFO"
    weight: 0.5
    enabled: true
    suggested: false

  - id: "petclinic-owner-controller-public"
    name: "Owner controllers should be public"
    description: "Owner controller classes should be public"
    type: "MODIFIER_CHECK"
    from_package: "org.springframework.samples.petclinic.owner..*"
    constraint: "SHOULD_BE_PUBLIC"
    from_selector_mode: "CLASS_TYPE"
    from_class_type: "CONTROLLER"
    to_selector_mode: "PACKAGE"
    severity: "INFO"
    weight: 0.4
    enabled: true
    suggested: false

  - id: "petclinic-vet-controller-public"
    name: "Vet controllers should be public"
    description: "Vet controller classes should be public"
    type: "MODIFIER_CHECK"
    from_package: "org.springframework.samples.petclinic.vet..*"
    constraint: "SHOULD_BE_PUBLIC"
    from_selector_mode: "CLASS_TYPE"
    from_class_type: "CONTROLLER"
    to_selector_mode: "PACKAGE"
    severity: "INFO"
    weight: 0.4
    enabled: true
    suggested: false

  - id: "petclinic-system-controller-public"
    name: "System controllers should be public"
    description: "System controller classes should be public"
    type: "MODIFIER_CHECK"
    from_package: "org.springframework.samples.petclinic.system..*"
    constraint: "SHOULD_BE_PUBLIC"
    from_selector_mode: "CLASS_TYPE"
    from_class_type: "CONTROLLER"
    to_selector_mode: "PACKAGE"
    severity: "INFO"
    weight: 0.4
    enabled: true
    suggested: false

  - id: "petclinic-owner-controller-annotation"
    name: "Owner controllers should be annotated as Controller"
    description: "Owner controller classes should carry @Controller"
    type: "ANNOTATION_CHECK"
    from_package: "org.springframework.samples.petclinic.owner..*"
    constraint: "HAS_ANNOTATION"
    annotation: "org.springframework.stereotype.Controller"
    from_selector_mode: "CLASS_TYPE"
    from_class_type: "CONTROLLER"
    to_selector_mode: "PACKAGE"
    severity: "INFO"
    weight: 0.6
    enabled: true
    suggested: false

  - id: "petclinic-vet-controller-annotation"
    name: "Vet controllers should be annotated as Controller"
    description: "Vet controller classes should carry @Controller"
    type: "ANNOTATION_CHECK"
    from_package: "org.springframework.samples.petclinic.vet..*"
    constraint: "HAS_ANNOTATION"
    annotation: "org.springframework.stereotype.Controller"
    from_selector_mode: "CLASS_TYPE"
    from_class_type: "CONTROLLER"
    to_selector_mode: "PACKAGE"
    severity: "INFO"
    weight: 0.6
    enabled: true
    suggested: false

  - id: "petclinic-system-controller-annotation"
    name: "System controllers should be annotated as Controller"
    description: "System controller classes should carry @Controller"
    type: "ANNOTATION_CHECK"
    from_package: "org.springframework.samples.petclinic.system..*"
    constraint: "HAS_ANNOTATION"
    annotation: "org.springframework.stereotype.Controller"
    from_selector_mode: "CLASS_TYPE"
    from_class_type: "CONTROLLER"
    to_selector_mode: "PACKAGE"
    severity: "INFO"
    weight: 0.6
    enabled: true
    suggested: false

  - id: "petclinic-owner-controller-no-repository"
    name: "Owner controllers should not depend on repositories"
    description: "Owner controller classes should not access repositories directly"
    type: "DEPENDENCY"
    from_package: "org.springframework.samples.petclinic.owner..*"
    to_package: "org.springframework.samples.petclinic.owner..*"
    constraint: "NO_DEPENDENCY"
    from_selector_mode: "CLASS_TYPE"
    to_selector_mode: "CLASS_TYPE"
    from_class_type: "CONTROLLER"
    to_class_type: "REPOSITORY"
    severity: "ERROR"
    weight: 1.5
    enabled: true
    suggested: false

  - id: "petclinic-vet-controller-no-repository"
