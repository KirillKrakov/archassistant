version: "2.0"
project_id: spring-petclinic-microservices
project_type: "CUSTOM"
settings:
  max_iterations: 3
  timeout_seconds: 30
  default_strategy: "HYBRID"
  fail_on_critical: true
  auto_fix_naming: false

rules:
  # =====================
  # Global architecture
  # =====================
  - id: package-cycle-free
    name: Package slices should be free of cycles
    description: Microservice slices should not contain cyclic dependencies
    type: CYCLE_CHECK
    from_package: "org.springframework.samples.petclinic"
    constraint: "NO_CYCLE"
    from_selector_mode: "PACKAGE"
    to_selector_mode: "PACKAGE"
    slice_pattern: "org.springframework.samples.petclinic.(*)..*"
    max_cycle_length: 3
    severity: "CRITICAL"
    weight: 2.0
    enabled: true
    suggested: false

  - id: application-classes-name
    name: Application classes should have Application suffix
    description: Spring Boot application classes should use the Application suffix
    type: NAMING_CONVENTION
    from_package: "org.springframework.samples.petclinic..*"
    from_name_pattern: "*Application"
    constraint: "NAMING_SUFFIX"
    pattern: "Application"
    from_selector_mode: "PACKAGE"
    to_selector_mode: "PACKAGE"
    severity: "INFO"
    weight: 0.5
    enabled: true
    suggested: false

  - id: application-classes-public
    name: Application classes should be public
    description: Spring Boot application classes should be public
    type: MODIFIER_CHECK
    from_package: "org.springframework.samples.petclinic..*"
    from_name_pattern: "*Application"
    constraint: "SHOULD_BE_PUBLIC"
    from_selector_mode: "PACKAGE"
    to_selector_mode: "PACKAGE"
    severity: "INFO"
    weight: 0.4
    enabled: true
    suggested: false

  - id: application-classes-annotation
    name: Application classes should be annotated with @SpringBootApplication
    description: Spring Boot application classes should carry @SpringBootApplication
    type: ANNOTATION_CHECK
    from_package: "org.springframework.samples.petclinic..*"
    from_name_pattern: "*Application"
    constraint: "HAS_ANNOTATION"
    annotation: "org.springframework.boot.autoconfigure.SpringBootApplication"
    from_selector_mode: "PACKAGE"
    to_selector_mode: "PACKAGE"
    severity: "INFO"
    weight: 0.6
    enabled: true
    suggested: false

  - id: config-classes-annotation
    name: Config classes should be annotated with @Configuration
    description: Configuration classes should carry @Configuration
    type: ANNOTATION_CHECK
    from_package: "org.springframework.samples.petclinic..config..*"
    from_name_pattern: "*Config"
    constraint: "HAS_ANNOTATION"
    annotation: "org.springframework.context.annotation.Configuration"
    from_selector_mode: "PACKAGE"
    to_selector_mode: "PACKAGE"
    severity: "INFO"
    weight: 0.6
    enabled: true
    suggested: false

