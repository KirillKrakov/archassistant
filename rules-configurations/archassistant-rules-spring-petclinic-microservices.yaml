    weight: 0.6
    enabled: true
    suggested: false

  - id: api-gateway-controller-no-model-dependency
    name: API gateway controllers should not depend on domain models
    description: API gateway controllers should not depend directly on model packages
    type: DEPENDENCY
    from_package: "org.springframework.samples.petclinic.api.boundary.web..*"
    to_packages:
      - "org.springframework.samples.petclinic.customers.model..*"
      - "org.springframework.samples.petclinic.vets.model..*"
      - "org.springframework.samples.petclinic.visits.model..*"
    constraint: "NO_DEPENDENCY"
    from_selector_mode: "PACKAGE"
    to_selector_mode: "PACKAGE"
    severity: "ERROR"
    weight: 1.5
    enabled: true
    suggested: false

