spring:
  application:
    name: archassistant-backend

  autoconfigure:
    exclude:
      - org.springframework.ai.autoconfigure.openai.OpenAiAutoConfiguration

  # Database Configuration (можно закомментировать для этапа 1)
  datasource:
    url: jdbc:postgresql://postgres:5432/${POSTGRES_DB:archassistant}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  web:
    cors:
      allowed-origins: "*"
      allowed-methods: "*"
      allowed-headers: "*"
      allow-credentials: false

  # Отключаем JPA автоконфигурацию если БД не нужна на этапе 1
  # autoconfigure:
  #   exclude:
  #     - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
  #     - org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration

# ← ИСПРАВЛЕНО: Actuator использует префикс management, а не spring
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

# Application Configuration
server:
  port: 8080

# Logging Configuration
logging:
  format: ${LOG_FORMAT:TEXT}  # TEXT или JSON
  level:
    root: INFO
    com.example.archassistant: DEBUG
    com.tngtech.archunit: WARN
    org.springframework.web: DEBUG
    org.springframework.ai: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/archassistant.log
    max-size: 10MB
    max-history: 30

# Export configuration
export:
  max-records: 10000  # Лимит записей на один экспорт
  default-format: CSV

# Корреляция запросов
correlation:
  header-name: X-Correlation-Id