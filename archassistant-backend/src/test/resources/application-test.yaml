spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop  # Создать схему при старте, удалить после тестов
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  h2:
    console:
      enabled: true

  ai:
    openai:
      api-key: test-key  # Фиктивный ключ для тестов
      chat:
        options:
          model: gpt-4-test
          temperature: 0.0  # Детерминированные ответы для тестов

# Отключаем реальные вызовы в тестовом профиле
logging:
  level:
    root: WARN
    org.springframework.ai: WARN
    com.example.archassistant: DEBUG