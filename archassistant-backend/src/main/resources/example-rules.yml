# Пример конфигурации архитектурных правил для ArchAssistant
# Скопируйте в .archassistant/<project-id>/rules.yml и отредактируйте

version: "1.0"
project_id: "com.example.petclinic"
project_type: SPRING_BOOT

rules:
  # === Зависимости между слоями ===

  - id: "rule_001"
    name: "Services should not depend on controllers"
    description: "Сервисный слой не должен иметь зависимостей от контроллеров"
    type: DEPENDENCY
    from_package: "..service.."
    to_package: "..controller.."
    constraint: NO_DEPENDENCY
    severity: CRITICAL
    weight: 2.0
    enabled: true
    suggested: true

  - id: "rule_002"
    name: "Repositories should not depend on services"
    description: "Repository слой не должен зависеть от сервисов"
    type: DEPENDENCY
    from_package: "..repository.."
    to_package: "..service.."
    constraint: NO_DEPENDENCY
    severity: CRITICAL
    weight: 2.0
    enabled: true
    suggested: true

  - id: "rule_003"
    name: "Entities should be independent"
    description: "Entity не должны зависеть от других слоёв"
    type: DEPENDENCY
    from_package: "..entity.."
    to_packages:
      - "..service.."
      - "..controller.."
      - "..repository.."
    constraint: NO_DEPENDENCY
    severity: WARNING
    weight: 1.0
    enabled: true
    suggested: true

  # === Соглашения по именованию ===

  - id: "rule_004"
    name: "Services should have Service suffix"
    description: "Все сервисы должны иметь суффикс Service"
    type: NAMING_CONVENTION
    from_package: "..service.."
    constraint: NAMING_SUFFIX
    pattern: "Service"
    severity: INFO
    weight: 0.5
    enabled: true
    suggested: true

  - id: "rule_005"
    name: "Repositories should have Repository suffix"
    description: "Все repository классы должны иметь суффикс Repository"
    type: NAMING_CONVENTION
    from_package: "..repository.."
    constraint: NAMING_SUFFIX
    pattern: "Repository"
    severity: INFO
    weight: 0.5
    enabled: false  # Отключено по умолчанию
    suggested: true

  # === Аннотации ===

  - id: "rule_006"
    name: "Services must have @Service annotation"
    description: "Все сервисы должны быть аннотированы @Service"
    type: ANNOTATION_CHECK
    from_package: "..service.."
    constraint: HAS_ANNOTATION
    annotation: "org.springframework.stereotype.Service"
    severity: WARNING
    weight: 1.0
    enabled: true
    suggested: false  # Пользовательское правило

settings:
  max_iterations: 3
  timeout_seconds: 30
  default_strategy: "HYBRID"
  fail_on_critical: true
  auto_fix_naming: false

created_at: "2026-01-15T10:30:00"
updated_at: "2026-01-15T10:30:00"