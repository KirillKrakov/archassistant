spring:
  application:
    name: archassistant-backend

  autoconfigure:
    exclude:
      - org.springframework.ai.autoconfigure.openai.OpenAiAutoConfiguration

  # Database Configuration (можно закомментировать для этапа 1)
  datasource:
    url: jdbc:postgresql://postgres:5432/${POSTGRES_DB:archassistant}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  web:
    cors:
      allowed-origins: "*"
      allowed-methods: "*"
      allowed-headers: "*"
      allow-credentials: false

  # Отключаем JPA автоконфигурацию если БД не нужна на этапе 1
  # autoconfigure:
  #   exclude:
  #     - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
  #     - org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration

# ← ИСПРАВЛЕНО: Actuator использует префикс management, а не spring
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

# Application Configuration
server:
  port: 8080

# Logging Configuration
logging:
  format: ${LOG_FORMAT:TEXT}  # TEXT или JSON
  level:
    root: INFO
    com.example.archassistant: DEBUG
    com.tngtech.archunit: WARN
    org.springframework.web: DEBUG
    org.springframework.ai: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/archassistant.log
    max-size: 10MB
    max-history: 30

# Export configuration
export:
  max-records: 10000  # Лимит записей на один экспорт
  default-format: CSV

# Корреляция запросов
correlation:
  header-name: X-Correlation-Id

archassistant:
  config-root: ${ARCHASSISTANT_CONFIG_ROOT:.archassistant}

  compliance:
    threshold: ${ARCHASSISTANT_COMPLIANCE_THRESHOLD:70.0}
    weights:
      rules-pass: ${ARCHASSISTANT_WEIGHT_RULES_PASS:1.0}
      pattern-match: ${ARCHASSISTANT_WEIGHT_PATTERN_MATCH:0.5}
      dependency-correct: ${ARCHASSISTANT_WEIGHT_DEPENDENCY_CORRECT:0.5}

  export:
    max-records: ${ARCHASSISTANT_EXPORT_MAX_RECORDS:10000}
    default-format: ${ARCHASSISTANT_EXPORT_DEFAULT_FORMAT:CSV}

  cache:
    project-context-ttl-minutes: ${ARCHASSISTANT_CONTEXT_TTL_MINUTES:30}
    max-entries: ${ARCHASSISTANT_CONTEXT_CACHE_MAX_ENTRIES:32}

  llm:
    provider: ${LLM_PROVIDER:mistral}

    mistral:
      base-url: ${MISTRAL_BASE_URL:https://api.mistral.ai}
      api-key: ${MISTRAL_API_KEY:}
      model: ${MISTRAL_MODEL:mistral-medium-latest}
      temperature: ${MISTRAL_TEMPERATURE:0.2}
      max-tokens: ${MISTRAL_MAX_TOKENS:10000}

    deepseek:
      base-url: ${DEEPSEEK_BASE_URL:https://api.deepseek.com}
      api-key: ${DEEPSEEK_API_KEY:}
      model: ${DEEPSEEK_MODEL:deepseek-chat}
      temperature: ${DEEPSEEK_TEMPERATURE:0.2}
      max-tokens: ${DEEPSEEK_MAX_TOKENS:10000}

    groq:
      base-url: ${GROQ_BASE_URL:https://api.groq.com/openai/v1}
      api-key: ${GROQ_API_KEY:}
      model: ${GROQ_MODEL:llama-3.3-70b-versatile}
      temperature: ${GROQ_TEMPERATURE:0.2}
      max-tokens: ${GROQ_MAX_TOKENS:10000}