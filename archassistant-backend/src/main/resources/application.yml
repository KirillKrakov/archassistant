spring:
  application:
    name: archassistant-backend

  # Database Configuration (можно закомментировать для этапа 1)
  datasource:
    url: jdbc:postgresql://postgres:5432/${POSTGRES_DB:archassistant}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  ai:
    openai:
      base-url: https://api.groq.com/openai/v1
      api-key: ${GROQ_API_KEY}
      chat:
        options:
          model: ${GROQ_MODEL:llama3-70b-8192}
          temperature: 0.2
          max-tokens: 4096
      embedding:
        enabled: false

  web:
    cors:
      allowed-origins: "*"
      allowed-methods: "*"
      allowed-headers: "*"
      allow-credentials: false

  # Отключаем JPA автоконфигурацию если БД не нужна на этапе 1
  # autoconfigure:
  #   exclude:
  #     - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
  #     - org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration

# ← ИСПРАВЛЕНО: Actuator использует префикс management, а не spring
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

# Application Configuration
server:
  port: 8080

# Logging Configuration
logging:
  level:
    root: INFO
    com.example.archassistant: DEBUG
    com.tngtech.archunit: WARN
    org.springframework.web: DEBUG
    org.springframework.ai: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"